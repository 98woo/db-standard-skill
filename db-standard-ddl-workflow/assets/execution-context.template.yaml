# Execution Context template for db-standard-ddl-workflow
project_id:
project_nm:
dbms_type:
dbms_version:
dbms_connection_target:
dbms_profile: auto

# Fixed standard repository. Do not change.
standard_repository:
  logical_nm: db_standard
  db_nm: db_standard
  dictionary_schema_nm: db_standard
  namespace_kind: auto
  object_identifier_pattern: auto
  word_table_nm: tb_db_com_std_word
  domain_table_nm: tb_db_com_std_dmn
  term_table_nm: tb_db_com_std_trm
  word_seq: db_standard.seq_tb_db_com_std_word
  term_seq: db_standard.seq_tb_db_com_std_trm

# Project metadata artifacts live under db_standard.db_standard.
# For new projects, definition tables are bootstrapped from Korean column names:
# standardization_applied=false, web_search_allowed=false,
# physical names are generated as snake_case, and all definition columns are text.
# The field_map below is generated by the agent after bootstrap or restored from an existing project.
metadata_repository:
  db_nm: db_standard
  project_schema_nm: db_standard
  table_definition:
    table_nm:
    pk_strategy:
    id_sequence:
    field_map:
      table_id:
      target_db:
      target_schema:
      owner:
      subject_area_cd:
      subject_area_nm:
      subject_area_group_nm:
      logical_table_name:
      physical_table_name:
      table_type:
      related_entity_name:
      description:
  column_definition:
    table_nm:
    pk_strategy:
    id_sequence:
    field_map:
      column_id:
      table_id:
      column_order:
      logical_column_name:
      physical_column_name:
      domain_name:
      data_type:
      data_length:
      nullable:
      primary_key:
      foreign_key:
      unique_key:
      indexed:
      constraint_text:
      default_value:
      description:

# Physical table target. Each namespace route must include at least one subject/owner code.
# Namespace meaning depends on DBMS: PostgreSQL=schema, Oracle=owner/schema,
# MySQL/MariaDB=database, SQL Server=schema.
physical_target:
  db_nm:
  target_namespace_map:
    - namespace_nm:
      namespace_kind: auto
      subject_area_cds:
      subject_area_nms:
      owner_codes:

# Run control
run_mode: preview              # preview | approval | execute
catalog_lookup_mode: unavailable  # live | provided_results | unavailable
write_execution_enabled: false

# Optional project policies
identifier_case_policy: auto
sequence_naming_policy: SEQ_<TABLE_NAME>
owner_resolution_mode: direct  # direct | word_dictionary | project_mapping
namespace_routing_key: table_owner # table_owner | subject_area_cd | project_mapping
